[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "london"

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
polkadot = "https://eth-rpc.polkadot.io/"
polkadot_alt = "https://services.polkadothub-rpc.com/mainnet/"
polkadot_testnet = "https://eth-rpc-testnet.polkadot.io/"
polkadot_testnet_alt = "https://services.polkadothub-rpc.com/testnet/"

[etherscan]
polkadot = { key = "", chain_id = 420420419, url = "https://blockscout.polkadot.io/api?" }
polkadot_testnet = { key = "", chain_id = 420420422, url = "https://blockscout-testnet.polkadot.io/api?" }
